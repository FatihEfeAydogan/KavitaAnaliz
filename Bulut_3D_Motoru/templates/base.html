<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dental Analysis Platform{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    
    <style>
        body { 
            background-color: #f4f7f6; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
        .main-content { flex: 1; }
        footer {
            background-color: #ffffff;
            border-top: 1px solid #e2e8f0;
            padding: 15px 0;
            color: #718096;
            font-size: 0.9rem;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-shield-plus me-2"></i>Dental Analysis</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <div class="navbar-nav gap-2">
                    <a class="btn btn-warning btn-sm px-3" href="/"><i class="bi bi-plus-circle me-1"></i>Yeni Analiz</a>
                    <a class="btn btn-light btn-sm px-3" href="/students"><i class="bi bi-people me-1"></i>Kayıtlı Öğrenciler</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-content container mt-4 mb-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center shadow-sm mt-auto">
        <div class="container">
            Dental Analysis Platform © 2026 | Tüm Hakları Saklıdır.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
