{% extends "base.html" %}

{% block title %}Yeni Analiz Başlat{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <h2 class="text-center mb-4">Öğrenci Kavite Değerlendirme Sistemi</h2>

        <form action="/process" method="POST" enctype="multipart/form-data" class="p-4 shadow bg-white rounded border-top border-primary border-4">
            
            <h5 class="mb-3 text-primary border-bottom pb-2">Öğrenci Bilgileri</h5>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Ad</label>
                    <input type="text" class="form-control" name="student_name" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Soyad</label>
                    <input type="text" class="form-control" name="student_lastname" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Öğrenci Numarası</label>
                <input type="text" class="form-control" name="student_no" required>
            </div>

            <h5 class="mb-3 text-primary border-bottom pb-2">Preparasyon Fotoğrafı</h5>
            
            <div class="mb-3">
                <label class="form-label fw-bold text-dark">Oklüzal (90°) Fotoğraf <span class="text-danger">*</span></label>
                <input type="file" class="form-control form-control-sm" name="img_90" accept="image/*" required>
                <small class="text-muted">Tüm analizler ArUco referanslı bu tek dik görünüm üzerinden gerçekleştirilecektir.</small>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-4 fw-bold fs-5 shadow-sm">Analizi Başlat</button>
        </form>
    </div>
</div>
{% endblock %}
