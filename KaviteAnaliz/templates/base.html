<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Dental Analysis{% endblock %}</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        body { background: #f7f7f7; }
        .navbar-brand { font-weight: bold; }
        footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            color: #777;
        }
    </style>

    {% block head %}{% endblock %}
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">Dental Analysis</a>

        <div>
            <a class="btn btn-light btn-sm" href="/students">Öğrenciler</a>
            <a class="btn btn-warning btn-sm" href="/">Yeni Analiz</a>
        </div>
    </div>
</nav>

<!-- PAGE CONTENT -->
<div class="container mt-4 mb-4">
    {% block content %}{% endblock %}
</div>

<!-- FOOTER -->
<footer>
    Dental Analysis Platform © 2025
</footer>

</body>
</html>
