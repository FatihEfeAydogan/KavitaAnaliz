<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>STL Analiz Aracı - Otomatik İşlem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    .loading-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
    }
    .loading-text {
      font-size: 1.2rem;
      font-weight: bold;
      color: #0d6efd;
      margin-top: 15px;
      text-align: center;
    }
    .loading-subtext {
      font-size: 0.9rem;
      color: #6c757d;
      margin-top: 5px;
    }
  </style>
</head>
<body class="bg-light">

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-border text-primary" style="width: 4rem; height: 4rem;" role="status"></div>
    <div class="loading-text" id="loadingText">İşlem yapılıyor, lütfen bekleyin...</div>
    <div class="loading-subtext" id="loadingSubtext">Bu işlem modelin boyutuna göre birkaç dakika sürebilir. Lütfen sekmeyi kapatmayın.</div>
  </div>

  <div class="container mt-5">
    <h2 class="text-center mb-4">STL Dosyası Yükle ve Otomatik Analiz Et</h2>

    <form id="uploadForm" class="p-4 shadow bg-white rounded">
      <div class="mb-3">
        <label class="form-label">Öğrenci Adı</label>
        <input type="text" class="form-control" name="student_name" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Öğrenci Soyadı</label>
        <input type="text" class="form-control" name="student_lastname" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Öğrenci Numarası</label>
        <input type="text" class="form-control" name="student_no" required>
      </div>
      <div class="mb-3">
        <label class="form-label">STL Dosyası Seç</label>
        <input type="file" class="form-control" name="stl_file" accept=".stl" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fs-5">Dosyayı Yükle ve Analizi Başlat</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('uploadForm').onsubmit = async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);

      try {
        // --- ADIM 0: DOSYAYI YÜKLE ---
        showLoading("Dosya yükleniyor...");
        const resInit = await fetch('/init_upload', { method: 'POST', body: formData });
        const dataInit = await resInit.json();
        
        if (!dataInit.success) { 
            alert("Yükleme hatası: " + dataInit.message); 
            hideLoading();
            return; 
        }

        let currentData = dataInit;

        // --- ADIM 1: HİZALAMA ---
        showLoading("Adım 1/3: Model hizalanıyor (Rotation & ICP)...");
        const resRotate = await fetch('/process_step', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...currentData, type: 'rotate' })
        });
        const dataRotate = await resRotate.json();
        if (dataRotate.success) currentData.filename = dataRotate.new_filename;

        // --- ADIM 2: KESME ---
        showLoading("Adım 2/3: Modelin gereksiz alt kısımları kesiliyor...");
        const resCrop = await fetch('/process_step', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...currentData, type: 'crop' })
        });
        const dataCrop = await resCrop.json();
        if (dataCrop.success) currentData.filename = dataCrop.new_filename;

        // --- ADIM 3: ANALİZ ---
        showLoading("Adım 3/3: Topoloji ve Metrik analizi yapılıyor (Bu en uzun adımdır)...");
        const resAnalyze = await fetch('/process_step', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...currentData, type: 'analyze' })
        });
        const dataAnalyze = await resAnalyze.json();
        
        if (!dataAnalyze.success) {
            alert("Analiz hatası: " + dataAnalyze.message);
            hideLoading();
            return;
        }

        // --- BİTİŞ: YÖNLENDİRME ---
        showLoading("İşlemler başarıyla tamamlandı! Sonuç sayfasına yönlendiriliyorsunuz...");
        window.location.href = `/result/${currentData.student_id}`;

      } catch (error) {
        alert("Bağlantı veya sunucu hatası oluştu: " + error);
        hideLoading();
      }
    };

    function showLoading(text) {
      document.getElementById('loadingOverlay').style.display = 'flex';
      document.getElementById('loadingText').innerText = text;
    }

    function hideLoading() {
      document.getElementById('loadingOverlay').style.display = 'none';
    }
  </script>
</body>
</html>
